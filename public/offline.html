<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0B1220" />
  <title>미러온 — 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0B1220;
      color: #F4F7FB;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
    p { font-size: 20px; color: #9FB0C8; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>인터넷이 연결되어 있지 않아요</h1>
  <p>Wi-Fi를 켜고 다시 열어주세요</p>
</body>
</html>
